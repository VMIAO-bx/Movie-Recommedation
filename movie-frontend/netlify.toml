# ============================================================
# Netlify 部署配置
# ============================================================

[build]
  command = "npm run build"
  publish = "dist"
  # Node 18 is LTS, works well with Vite 5
  # Netlify defaults are fine — adjust if needed:
  # NODE_VERSION = "18"

# ============================================================
# 环境变量（运行时 & 构建时共享）
# 在 Netlify 面板中设置:
#   VITE_API_BASE_URL  = 你的 Railway 后端地址 (例如 https://xxx.railway.app/api)
#   VITE_TMDB_API_KEY  = 你的 TMDB API Key
#
# 本地开发用 .env 文件:
#   VITE_API_BASE_URL=http://localhost:8080/api
#   VITE_TMDB_API_KEY=你的key
# ============================================================

# ============================================================
# 路由规则（从上到下，先匹配先生效）
# ============================================================

# 1. TMDB API 代理 — 保持和本地 Vite 代理一致的行为
#    /tmdb/3/movie/popular → https://api.themoviedb.org/3/movie/popular
[[redirects]]
  from = "/tmdb/3/*"
  to = "https://api.themoviedb.org/3/:splat"
  status = 200
  force = true

# 2. SPA 回退 — 所有不匹配静态文件的路径都返回 index.html
#    Vue Router 在客户端接管路由
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
